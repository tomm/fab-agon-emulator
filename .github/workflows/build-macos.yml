name: Build macOS binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install SDL3 dependencies via Homebrew
        run: |
          brew install sdl3 sdl3_ttf sdl3_image

      - name: Build macOS binary
        run: |
          # Resolve brew prefix at runtime so env vars are correct
          export SDL3_LIB_DIR="$(brew --prefix)/lib"
          export SDL3_INCLUDE_DIR="$(brew --prefix)/include/SDL3"
          export SDL3_STATIC=0
          export CMAKE_POLICY_VERSION_MINIMUM=3.5

          mkdir -p artifacts
          make clean
          make vdp
          # only build arm one. can't figure out this god damn platform
          FORCE=1 cargo build -r --target=aarch64-apple-darwin
          cp ./target/aarch64-apple-darwin/release/fab-agon-emulator ./fab-agon-emulator

          VERSION=`cargo tree --depth 0 | awk '{print $2;}'`
          DIST_DIR=fab-agon-emulator-macos

          rm -rf $DIST_DIR
          mkdir $DIST_DIR
          cp ./fab-agon-emulator $DIST_DIR
          cp -r ./firmware $DIST_DIR
          cp LICENSE README.md $DIST_DIR
          mkdir $DIST_DIR/sdcard
          cp -r sdcard/* $DIST_DIR/sdcard/
          zip $DIST_DIR.zip -r $DIST_DIR/*
          mv $DIST_DIR.zip artifacts/

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: fab-agon-emulator-macos
          path: fab-agon-emulator-macos.zip
          retention-days: 30
