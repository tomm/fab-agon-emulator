name: Build macOS binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install SDL3 from DMG
        run: |
          SDL_VERSION="3.4.4"
          SDL_TTF_VERSION="3.2.2"
          SDL_IMAGE_VERSION="3.2.4"

          install_dmg() {
            local url=$1
            local dmg=$(basename "$url")
            curl -L "$url" -o "$dmg"
            hdiutil attach "$dmg" -mountpoint /Volumes/SDL -quiet
            sudo cp -R /Volumes/SDL/*.framework /Library/Frameworks/
            hdiutil detach /Volumes/SDL -quiet
            rm "$dmg"
          }

          install_dmg "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-${SDL_VERSION}.dmg"
          install_dmg "https://github.com/libsdl-org/SDL_ttf/releases/download/release-${SDL_TTF_VERSION}/SDL3_ttf-${SDL_TTF_VERSION}.dmg"
          install_dmg "https://github.com/libsdl-org/SDL_image/releases/download/release-${SDL_IMAGE_VERSION}/SDL3_image-${SDL_IMAGE_VERSION}.dmg"

      - name: Build macOS binary
        run: |
          export SDL3_LIB_DIR="/Library/Frameworks/SDL3.framework"
          export SDL3_INCLUDE_DIR="/Library/Frameworks/SDL3.framework/Headers"
          export SDL3_STATIC=0
          export CMAKE_POLICY_VERSION_MINIMUM=3.5

          mkdir -p artifacts
          ./dist_scripts/make-dist-macos.sh

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r ../fab-agon-emulator-macos.zip .
          cd ..

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: fab-agon-emulator-macos
          path: fab-agon-emulator-macos.zip
          retention-days: 30
